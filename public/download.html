<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dein Foto</title>
  <style>
    :root { font-family: "Patrick Hand", "Segoe Print", "Comic Sans MS", cursive; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #2b2b2b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem;
      box-sizing: border-box;
    }
    img {
      max-width: 100%;
      max-height: 70vh;
      border: 4px solid #fffef8;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      background: #fffef8;
      padding: 4px;
    }
    a {
      font-size: 1.5rem;
      color: #2b2b2b;
      background: #fffef8;
      text-decoration: none;
      padding: 0.7rem 2.5rem;
      border: 3px solid #2b2b2b;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <img src="/photos/{{ID}}.jpg" alt="Dein Foto">
  <a href="/photos/{{ID}}.jpg" download="fotobox-{{ID}}.jpg">Herunterladen</a>
</body>
</html>
